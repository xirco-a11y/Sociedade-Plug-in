<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sociedade Plug In - Proximos Alertas</title>
  <meta name="theme-color" content="#213a62">
  <link rel="icon" type="image/svg+xml" href="/assets/icons/plugin-icon.svg">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>
  <div class="shell">
    <header class="topbar glass">
      <div>
        <h1>Proximos Alertas</h1>
        <p data-user-label>Planeamento semanal por casa</p>
      </div>
      <div class="topbar-actions">
        <button class="button danger js-logout" type="button">Sair</button>
      </div>
    </header>

    <nav class="subnav">
      <a class="subnav-link" href="/app">Painel</a>
      <a class="subnav-link" href="/configuracoes">Configuracoes</a>
      <a class="subnav-link" href="/avisos-hoje">Avisos de Hoje</a>
      <a class="subnav-link active" href="/proximos-alertas">Proximos Alertas</a>
      <a class="subnav-link" href="/condicoes">Condicoes</a>
      <a class="subnav-link" href="/calculadora-hedge">Calculadora Hedge</a>
    </nav>

    <section class="grid one">
      <article class="card">
        <h2>Calendario de verificacao e bonus</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Casa</th>
                <th>Prox. verificacao</th>
                <th>Prox. bonus</th>
              </tr>
            </thead>
            <tbody id="upcoming-alerts-body"></tbody>
          </table>
        </div>
        <p id="upcoming-status" class="status muted"></p>
      </article>
    </section>
  </div>

  <script src="../assets/js/app.js"></script>
</body>
</html>
