<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sociedade Plug In</title>
  <meta name="theme-color" content="#213a62">
  <link rel="icon" type="image/svg+xml" href="/assets/icons/plugin-icon.svg">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <main class="hero">
    <p class="tagline">Acesso ao sistema</p>
    <h1>Sociedade Plug In</h1>
    <form id="login-form" class="login-form" novalidate>
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button id="login-button" type="submit">Entrar</button>
    </form>
    <p id="login-status" class="status" aria-live="polite">Introduz o teu username e password.</p>
  </main>
  <script src="../assets/js/main.js"></script>
</body>
</html>
