<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Sociedade Plug In Icon</title>
  <desc id="desc">Rounded square blue gradient icon with a white plug symbol.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2f4f"/>
      <stop offset="100%" stop-color="#2b819a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#10203a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="110" fill="url(#bg)"/>
  <g fill="#f7fbff" filter="url(#shadow)">
    <rect x="206" y="118" width="32" height="86" rx="14"/>
    <rect x="274" y="118" width="32" height="86" rx="14"/>
    <rect x="166" y="184" width="180" height="164" rx="44"/>
    <rect x="230" y="326" width="52" height="70" rx="20"/>
    <rect x="174" y="380" width="164" height="40" rx="20"/>
  </g>
  <circle cx="370" cy="164" r="22" fill="#8fd2ff"/>
</svg>
